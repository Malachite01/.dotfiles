general {
  hide_cursor = false
  no_fade_in = false
  grace = 0
  ignore_empty_input = false
}

# Auth configuration
auth {
  pam:enabled = true
  fingerprint:enabled = true
  fingerprint:ready_message = (Ou placez le doigt sur le lecteur) 
  fingerprint:present_message = 󰈷 Lecture...
}

# Animations
bezier = easeInOutQuart, 0.76, 0, 0.24, 1
bezier = easeOutExpo, 0.16, 1, 0.3, 1

animation = fade, 1, 0.8, easeInOutQuart
animation = inputFieldFade, 1, 0.6, easeInOutQuart
animation = inputFieldColors, 1, 0.4, easeInOutQuart

# Bg
background {
  monitor =
  path = ~/Images/Wallpaper/Fire_Gradient_Blurred.jpg
}

# Time 
label {
  monitor =
  text = $TIME
  font_size = 110
  font_family = FiraCode Nerd Font Bold
  position = 0,350
  halign = center
  valign = center
}

# Date (below time)
label {
  monitor =
  text = cmd[update:60000] echo "$(date '+%A %d %B')"
  font_size = 16
  font_family = FiraCode Nerd Font
  position = 0, 260
  halign = center
  valign = center
}

# Avatar
image {
  monitor =
  path = /var/lib/AccountsService/icons/$USER
  size = 225
  border_size = 0
  rounding = -1  # circular
  position = 0, 20
  halign = center
  valign = center 
}

# Username (below avatar)
label {
  monitor =
  text = $DESC  # Full name if available, otherwise $USER
  font_size = 20
  font_family = JetBrains Mono Medium
  position = 0, -120
  halign = center
  valign = center
}

# Password input
input-field {
  monitor =
  size = 300, 40
  outline_thickness = 2
  dots_size = 0.30
  dots_spacing = 0.3
  dots_center = false

  outer_color = rgba(80, 73, 69, 0.8)  # bg4 with transparency
  inner_color = rgba(40, 40, 40, 0.9)  # bg1 darker
  font_color = rgba(240, 230, 230, 1.0)
  font_family = JetBrains Mono 
  
  fade_on_empty = false
  placeholder_text = <span foreground='##a89984' size='14pt'>Mot de passe                             </span>

  check_color = rgba(131, 165, 152, 1.0)  # lgruv_aqua
  fail_color = rgba(234, 105, 98, 1.0)  # lgruv_red
  fail_text = <span foreground='##ea6962' size='14pt'><b>Échec</b></span> 
  
  rounding = 8
  position = 0, -195
  halign = center
  valign = center
}

# Fingerprint status
label {
  monitor =
  text = $FPRINTPROMPT
  color = rgba(168, 153, 132, 1.0)  # fg3
  font_size = 13
  font_family = JetBrains Mono
  position = 0, -250
  halign = center
  valign = center
}

# Keyboard layout indicator (bottom left)
label {
  monitor =
  text = $LAYOUT
  font_size = 12
  font_family = FiraCode Nerd Font
  position = 10, -4 
  halign = left
  valign = top
}
