#####################
### LOOK AND FEEL ###
#####################
 
# Refer to https://wiki.hypr.land/Configuring/Variables/
 
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 10
    gaps_out = 25
 
    border_size = 1
 
    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(a89984ee)
    col.inactive_border = rgba(504945aa)
 
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false
 
    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false
 
    layout = dwindle
}
 
# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    rounding = 10
    rounding_power = 2
 
    shadow {  
        enabled = true
        range = 25
        render_power = 15  
        color = rgba(30, 30, 30, 1)
    }  
 
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
    }
}
 
 
########################
### BLUR LAYER RULES ###
########################
 
# Blur for Rofi and Waybar
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 1, match:namespace rofi
 
# Blur pour Quickshell Overview
layerrule = blur on, match:namespace quickshell:overview
layerrule = ignore_alpha 1, match:namespace quickshell:overview
# dim_around pour Quickshell Overview (assombrit le reste de l'écran)
layerrule = dim_around on, match:namespace quickshell:overview
 
# Blur kitty
layerrule = blur on, match:namespace kitty
layerrule = ignore_alpha 1, match:namespace kitty
 
 
##################
### ANIMATIONS ###
##################
 
#https://wiki.hypr.land/Configuring/Variables/#animations
layerrule = animation slide, match:namespace rofi
layerrule = animation slide_down, match:namespace quickshell:overview
 
animations {
    enabled = true
    # Animation curves
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1
    # Animation configs
    animation = layersIn, 1, 3, emphasizedDecel, slide
    animation = layersOut, 1, 2, emphasizedAccel, slide
    animation = fadeLayers, 1, 3, standard
    animation = windowsIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedAccel
    animation = windowsMove, 1, 3, standard
    animation = workspaces, 1, 3, standard
    animation = specialWorkspace, 1, 2, specialWorkSwitch, slidefadevert 15%
    animation = fade, 1, 3, standard
    animation = fadeDim, 1, 3, standard
    animation = border, 1, 3, standard
}
 
 
###############
### LAYOUTS ###
###############
 
# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]
 
# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}
 
# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}
 
 
#############
### INPUT ###
#############
 
# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
 
    follow_mouse = 1
 
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
 
    touchpad {
        natural_scroll = true
    }
}
 
# gesture = 3, horizontal, workspace  # REMOVED: gesture keyword was removed in 0.53, use hyprgrass plugin instead
 
# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = tpps/2-elan-trackpoint 
    sensitivity = -0.3
}
 
 
####################
### MISC OPTIONS ###
####################
 
# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    exit_window_retains_fullscreen = true
    focus_on_activate = true
}
 
 
###################
### KEYBINDINGS ###
###################
 
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
 
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
 
# --- ACTIONS ---
bind = $mainMod, K, exit,
bind = $mainMod, C, killactive,
bind = $mainMod, F, exec, pypr layout_center toggle
bind = $mainMod, L, exec, hyprlock
 
# --- EXECS ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, $terminal nvim
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
 
# --- UTILITAIRES ---
bind = $mainMod, I, exec, $colorpicker
bind = $mainMod, S, exec, hyprshot -m region --freeze
bind = $mainMod SHIFT, S, exec, hyprshot -m window --freeze
bind = , PRINT, exec, hyprshot -m output --freeze
bind = $mainMod, T, exec, grim -g "$(slurp)" - | python ~/.config/hypr/scripts/ocr.py | wl-copy
 
# --- MENU ---
bind = $mainMod, G, exec, qs ipc -c overview call overview toggle
# bind = CTRL, ALT+TAB, exec, qs ipc -c overview call overview toggle
bind = $mainMod, P, exec, ~/.config/rofi/powermenu/powermenu.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Clipboard >" -no-show-icons -theme list | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, nwg-clipman
bind = $mainMod, N, exec, cat ~/.config/rofi/nerdfont/nerdfont.txt | rofi -dmenu -i -p "Nerd Icon >" -no-show-icons -theme list | awk '{print $1}' | wl-copy
bind = $mainMod, M, exec,
 
# bind = $mainMod, V, togglefloating,
# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
 
# --- FOCUS MOVEMENT ---
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
 
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
 
# --- WORKSPACES ---
# Workspaces AZERTY - utilise les symboles au lieu des chiffres
bind = $mainMod, ampersand, workspace, 1    # &
bind = $mainMod, eacute, workspace, 2       # é
bind = $mainMod, quotedbl, workspace, 3     # "
bind = $mainMod, apostrophe, workspace, 4   # '
bind = $mainMod, parenleft, workspace, 5    # (
bind = $mainMod, minus, workspace, 6        # -
bind = $mainMod, egrave, workspace, 7       # è
bind = $mainMod, underscore, workspace, 8   # _
bind = $mainMod, ccedilla, workspace, 9     # ç
bind = $mainMod, agrave, workspace, 10      # à
 
# Move to workspace AZERTY
bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10
 
# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic
 
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
 
# --- MOUSE BINDINGS ---
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
 
# --- MULTIMEDIA KEYS ---
# Volume
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Micro
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Luminosité écran
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower
 
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
 
 
##############################
### WINDOWS AND WORKSPACES ###
##############################
 
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules
 
# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*
 
# Fix some dragging issues with XWayland
# windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:floating true, match:fullscreen false, match:pinned false
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:fullscreen false
 
# Persistent workspaces
workspace = 1, monitor:eDP-1, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 10, monitor:HDMI-A-1, persistent:true
