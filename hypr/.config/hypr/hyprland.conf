# https://wiki.hypr.land/Configuring/
autogenerated = 0
 
################
### MONITORS ###
################
 
# See https://wiki.hypr.land/Configuring/Monitors/
# Laptop screen (ie. Thinkpad P14s Gen 5)
monitor = eDP-1, 1920x1200@60, 0x0, 1.2
# Samsung TV via HDMI
monitor = HDMI-A-1, 3840x2160@60, 1600x0, 1.5
# Default for other things (ie. videoprojector)
monitor = , preferred, auto, 1
 
 
#############################
### ENVIRONMENT VARIABLES ###
#############################
 
# See https://wiki.hypr.land/Configuring/Environment-variables/
 
# Cursor
env = XCURSOR_THEME,CapitaineCursors
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32
env = GDK_SCALE,1.3
env = QT_SCALE_FACTOR,1
xwayland {
    force_zero_scaling = true
}
 
# GTK Theme (Gruvbox)
env = GTK_THEME,Gruvbox-Dark
env = GTK_ICON_THEME,Adwaita
 
# Wayland forcing
# Force Wayland for Electron apps
env = ELECTRON_OZONE_PLATFORM_HINT,auto
# Force Wayland for various toolkits
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
# Forcer Qt à utiliser qt6ct pour la configuration des thèmes
env = QT_QPA_PLATFORMTHEME,qt6ct
# Firefox/Mozilla
env = MOZ_ENABLE_WAYLAND,1
 
# Directories
# Screenshot directory
env= HYPRSHOT_DIR,/home/pandora/Images/Screenshots
 
 
###################
### MY PROGRAMS ###
###################
 
# See https://wiki.hypr.land/Configuring/Keywords/
 
# Set programs that you use
$terminal = kitty
$fileManager = nautilus 
$menu = rofi -show drun -icon-theme "Papirus" 
$colorpicker = hyprpicker -a
 
 
#################
### AUTOSTART ###
#################
 
# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
 
# Essentials
# exec-once = nm-applet &
exec-once = hyprpaper & waybar
exec-once = hypridle
 
# Authentication & Security
# Pour le polkit (ie. auth en root pour certaines apps)
exec-once = /usr/libexec/polkit-mate-authentication-agent-1
 
# Notifications
exec-once = swaync
exec-once = swayosd-server
 
# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = ~/.config/hypr/scripts/wl-clip-persist --clipboard regular
 
# Plugins & Tools
# Plugins (buildés from scratch)
exec-once = hyprctl plugin load /usr/lib/hyprland/plugins/hyprbars.so
# Quickshell
exec-once = qs -c overview
# Pypr (pour le fullscreen centering)
exec-once = /usr/bin/pypr
 
# Scripts
 
 
###############
### PLUGINS ###
###############
 
plugin {  
    hyprbars {  
        # General bar settings  
        enabled = true  
        bar_height = 26  
        bar_color = rgba(29, 32, 33, 0.92) 
        bar_blur = yes
        col.text = rgb(ebdbb2)         # Gruvbox light foreground    
        bar_text_font = JetBrainsMono Nerd Font  
	      bar_part_of_window = yes
 
        # Buttons (right-to-left) - format: bgcolor, size, icon, action, fgcolor  
        hyprbars-button = rgb(FB2E2B), 14, , hyprctl dispatch killactive, rgb(ffffff)     # red: close
        hyprbars-button = rgb(F9A827), 14, , pypr layout_center toggle, rgb(000000)   # yellow: fullscreen
        hyprbars-button = rgb(A8B024), 14, , hyprctl dispatch togglefloating, rgb(000000) # green: floating
        inactive_button_color = rgb(A59682)
 
        # Double-click action on the bar  
        on_double_click = hyprctl dispatch fullscreen 1  exec, pypr layout_center toggle 
  
        # Spacing between buttons  
        bar_button_padding = 5  
    }
}
 
 
