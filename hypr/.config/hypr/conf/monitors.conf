################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Laptop screen (ie. Thinkpad P14s Gen 5)
monitor = eDP-1, 1920x1200@60, 0x0, 1.2
# Samsung TV via HDMI
monitor = HDMI-A-1, 3840x2160@60, 1600x0, 1.5
# Default for other things (ie. videoprojector)
monitor = , preferred, auto, 1


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:fullscreen false

# Persistent workspaces
workspace = 1, monitor:eDP-1, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 10, monitor:HDMI-A-1, persistent:true
