###############
### PLUGINS ###
###############

plugin {  
    hyprbars {  
        # General bar settings  
        enabled = true  
        bar_height = 28
        bar_color = rgba(29, 32, 33, 0.92) 
        bar_blur = yes
        col.text = rgb(ebdbb2)         # Gruvbox light foreground    
        bar_text_font = JetBrainsMono Nerd Font  
	      bar_part_of_window = yes

        # Buttons (right-to-left) - format: bgcolor, size, icon, action, fgcolor  
        hyprbars-button = rgb(FB2E2B), 13, , hyprctl dispatch killactive, rgb(ffffff)     # red: close
        hyprbars-button = rgb(F9A827), 13, , pypr layout_center toggle, rgb(000000)   # yellow: fullscreen
        hyprbars-button = rgb(A8B024), 13, , hyprctl dispatch togglefloating, rgb(000000) # green: floating
        inactive_button_color = rgb(A59682)

        # Double-click action on the bar  
        on_double_click = hyprctl dispatch fullscreen 1  exec, pypr layout_center toggle 
  
        # Spacing between buttons  
        bar_button_padding = 6 
    }
}


