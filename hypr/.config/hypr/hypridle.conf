general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 150
    on-timeout = test ! -f /tmp/hypr-caffeine-state && brightnessctl -s set 6
    on-resume = brightnessctl -r
}

listener {
    timeout = 150
    on-timeout = test ! -f /tmp/hypr-caffeine-state && brightnessctl -sd tpacpi::kbd_backlight set 0
    on-resume = brightnessctl -rd tpacpi::kbd_backlight
}

listener {
    timeout = 600
    on-timeout = test ! -f /tmp/hypr-caffeine-state && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

listener {
    timeout = 900
    on-timeout = test ! -f /tmp/hypr-caffeine-state && systemctl suspend
}

